name: CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Code Quality (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Ruff
        run: pip install ruff==0.9.10

      - name: Ruff format check
        run: ruff format --check --diff .

      - name: Ruff lint check
        run: ruff check .

  security:
    name: Dependency Security Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy CI env file
        run: cp .env.ci .env

      - name: Build Docker images
        run: docker compose -p pause_empathique-local build --pull

      - name: Run dependency audit
        run: docker compose -p pause_empathique-local run --rm --entrypoint="" web sh -lc "poetry run pip install --upgrade pip pip-audit && poetry run pip-audit"

      - name: Cleanup
        if: always()
        run: docker compose -p pause_empathique-local down -v

  test:
    name: Django Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy CI env file
        run: cp .env.ci .env

      - name: Build Docker images
        run: docker compose -p pause_empathique-local build  --pull

      - name: Start and wait for database
        run: docker compose -p pause_empathique-local up -d --wait db

      - name: Run Django tests
        run: docker compose -p pause_empathique-local run --rm --entrypoint="" web poetry run python manage.py test

      - name: Cleanup
        if: always()
        run: docker compose -p pause_empathique-local down -v
